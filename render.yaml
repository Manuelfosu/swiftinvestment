# =============================================================================
# RENDER BLUEPRINT — backend files live at the REPO ROOT, so there is NO
# "Root Directory" to set. Hosts the whole app (front-end + API + database)
# on ONE URL. See DEPLOY-README.md for click-by-click steps.
# =============================================================================
services:
  - type: web
    name: swift-investments
    runtime: node
    plan: free
    buildCommand: "echo no build step needed"
    startCommand: "node --no-warnings --experimental-sqlite server.js"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"

    # -------------------------------------------------------------------------
    # OPTIONAL — make the database PERMANENT (survives restarts & redeploys).
    # Render persistent disks require a paid instance type. To enable:
    #   1. change "plan: free" above to "plan: starter"
    #   2. uncomment the disk block below
    #   3. uncomment the DB_FILE env var below
    # disk:
    #   name: swift-data
    #   mountPath: /data
    #   sizeGB: 1
    #   - key: DB_FILE
    #     value: /data/swift.db
